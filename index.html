<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="format-detection" content="telephone=no" />
    <title>RetroOasis</title>
    <meta name="description"
          content="RetroOasis is a polished browser arcade for PSP, NES, SNES, GBA, N64, and more. Bring your own games; your library stays local on your device." />
    <meta name="theme-color" content="#ff2e97" />
    <meta name="application-name" content="RetroOasis" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RetroOasis" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <!--
      Content-Security-Policy hardening.
      Note: frame-ancestors must be set as an HTTP header and is not honoured
      here, so production deployments should also set it via the server or CDN.

      Explanation of directives:
        base-uri 'self'   — prevent <base href> injection that could redirect
                            relative URLs to an attacker-controlled origin.
        object-src 'none' — disallow <object>/<embed>/<applet> plugin content,
                            which is a common XSS escalation vector.
    -->
    <meta http-equiv="Content-Security-Policy"
          content="base-uri 'self'; object-src 'none';" />

    <!-- Initial boot preloader — prevents flash of white before the app mounts -->
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.35s ease-out, visibility 0.35s ease-out;
      }
      #preloader.fade-out {
        opacity: 0;
        visibility: hidden;
      }
      #preloader .preloader-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 46, 151, 0.12);
        border-top-color: #ff2e97;
        border-right-color: #00f0ff;
        border-radius: 50%;
        animation: preloader-spin 0.8s linear infinite;
        box-shadow: 0 0 24px rgba(255, 46, 151, 0.45), 0 0 48px rgba(0, 240, 255, 0.25);
      }
      @keyframes preloader-spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.json" />

    <!-- Preconnect to EmulatorJS CDN for faster game launches -->
    <link rel="preconnect" href="https://cdn.emulatorjs.org" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.emulatorjs.org" />

    <!-- Typography: Shibuya Punk stack — Zen Dots (display/brand), Chakra Petch (UI),
         Space Mono (data/labels), Zen Kaku Gothic New (Japanese accents) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Chakra+Petch:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!--
      #app is where the TypeScript UI mounts at runtime.
      Structure (built by buildDOM() in ui.ts):

        #app
          header.app-header
          main.app-main
            section#landing        ← library grid + drop zone
            div#ejs-container      ← EmulatorJS mount (hidden until game loads)
            div#loading-overlay    ← spinner during boot
            div#error-banner       ← dismissible error
            div#system-picker      ← modal for ambiguous file extensions
            div#settings-panel     ← performance / library settings
          footer.app-footer
    -->
    <div id="preloader" aria-hidden="true">
      <div class="preloader-spinner"></div>
    </div>
    <div id="app"></div>

    <!-- Vite entry point -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
