name: Performance Budget

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  perf-budget:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build and check performance budgets
        run: npm run perf:audit
