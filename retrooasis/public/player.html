<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#071018" />
    <title>RetroOasis Play</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        font-family: "Chakra Petch", system-ui, sans-serif;
      }

      #display {
        width: 100%;
        height: 100%;
      }

      #game {
        width: 100%;
        height: 100%;
      }

      .ro-play-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.55rem 0.85rem;
        background: linear-gradient(180deg, rgba(7, 16, 24, 0.92), rgba(7, 16, 24, 0.35) 70%, transparent);
        color: #e8eef5;
        pointer-events: none;
      }

      .ro-play-bar a,
      .ro-play-bar button {
        pointer-events: auto;
        font: inherit;
        cursor: pointer;
        border: 1px solid #2ee6d6;
        background: rgba(7, 16, 24, 0.85);
        color: #2ee6d6;
        padding: 0.35rem 0.7rem;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.75rem;
      }

      .ro-play-bar a:hover,
      .ro-play-bar button:hover {
        background: #2ee6d6;
        color: #071018;
      }

      .ro-play-title {
        font-size: 0.8rem;
        opacity: 0.85;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ro-play-error {
        position: absolute;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 1rem;
        padding: 2rem;
        text-align: center;
        color: #e8eef5;
        background:
          radial-gradient(ellipse at center, #0d2230 0%, #071018 70%),
          #071018;
      }

      .ro-play-error h1 {
        margin: 0;
        font-family: "Press Start 2P", monospace;
        font-size: 0.9rem;
        color: #f0b429;
        line-height: 1.6;
      }

      .ro-play-error p {
        margin: 0;
        max-width: 28rem;
        color: #9aabbc;
      }
    </style>
  </head>
  <body>
    <div class="ro-play-bar">
      <a id="back" href="./#/">Exit</a>
      <span class="ro-play-title" id="title"></span>
    </div>
    <div id="display"><div id="game"></div></div>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const gameUrl = params.get("rom") || "";
        const core = params.get("core") || "";
        const name = params.get("name") || "Game";
        const bios = params.get("bios") || "";
        const back = params.get("back") || "./#/";

        document.getElementById("title").textContent = name;
        document.getElementById("back").setAttribute("href", back);
        document.title = name + " · RetroOasis";

        if (!gameUrl || !core) {
          document.body.innerHTML =
            '<div class="ro-play-error">' +
            "<h1>MISSING LOAD DATA</h1>" +
            "<p>Rom path and core are required to start EmulatorJS.</p>" +
            '<a href="' +
            back +
            '">Back to Oasis</a>' +
            "</div>";
          return;
        }

        // Relative to this page when deployed beside EmulatorJS data/
        window.EJS_player = "#game";
        window.EJS_gameName = name;
        window.EJS_gameUrl = gameUrl;
        window.EJS_core = core;
        window.EJS_biosUrl = bios;
        window.EJS_pathtodata = "data/";
        window.EJS_startOnLoaded = true;
        window.EJS_askBeforeExit = false;
        window.EJS_onExit = function () {
          window.location.href = back;
        };

        const script = document.createElement("script");
        script.src = "data/loader.js";
        script.onerror = function () {
          document.getElementById("display").innerHTML =
            '<div class="ro-play-error">' +
            "<h1>EMULATOR DATA MISSING</h1>" +
            "<p>Could not load <code>data/loader.js</code>. Deploy EmulatorJS <code>data/</code> next to this site, or run the Vite dev server from the RetroOasis repo.</p>" +
            '<a href="' +
            back +
            '">Back to Oasis</a>' +
            "</div>";
        };
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
