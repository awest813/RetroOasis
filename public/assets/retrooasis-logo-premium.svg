<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RetroOasis">
  <defs>
    <linearGradient id="ro-premium-wash" x1="18" y1="14" x2="78" y2="82" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ff6bb5"/>
      <stop offset="0.55" stop-color="#ff2e97"/>
      <stop offset="1" stop-color="#9c0f5a"/>
    </linearGradient>
    <linearGradient id="ro-premium-orb" x1="54" y1="32" x2="78" y2="64" gradientUnits="userSpaceOnUse">
