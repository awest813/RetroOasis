    <path d="M26 68V30H48.5C56.4 30 61.2 34.4 61.2 41.2C61.2 46.2 58.4 49.8 53.4 51.4L64.8 68H51.2L42.6 55.8H38.8V68H26Z" fill="#f7f2ff"/>
