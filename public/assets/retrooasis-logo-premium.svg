    <filter id="ro-premium-soft" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#ff2e97" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#050308" flood-opacity="0.55"/>
